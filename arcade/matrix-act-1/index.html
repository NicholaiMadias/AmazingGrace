<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Matrix Act 1 — Conscience Protocol. Seven chapters of encrypted signals and the architecture of forgiveness." />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <title>Matrix Act 1 | Nexus Arcade — Amazing Grace</title>
  <style>
    :root {
      --night: #0a0a14;
      --night-surface: #111122;
      --night-card: #161628;
      --gold: #ffd700;
      --purple: #7c3aed;
      --text: #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--night);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Star-field canvas ── */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 1;
      width: 100%; padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid rgba(255,215,0,.15);
      background: rgba(10,10,20,.8);
      backdrop-filter: blur(8px);
    }
    header a { color: var(--gold); text-decoration: none; font-size: .9rem; opacity: .8; }
    header a:hover { opacity: 1; }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      color: var(--gold);
      flex: 1;
    }

    /* ── Main ── */
    main {
      position: relative; z-index: 1;
      width: 100%; max-width: 820px;
      padding: 3rem 1.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 2rem;
      text-align: center;
    }
    .banner {
      font-size: 4rem;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      color: var(--gold);
      text-shadow: 0 0 24px rgba(255,215,0,.4);
    }
    .sub {
      color: #a78bfa;
      font-size: 1rem;
      max-width: 560px;
      line-height: 1.6;
    }

    /* ── Chapter list ── */
    .chapters {
      width: 100%;
      display: flex; flex-direction: column; gap: .75rem;
      text-align: left;
    }
    .chapter {
      background: var(--night-card);
      border: 1px solid rgba(124,58,237,.3);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      transition: border-color .2s, transform .2s;
    }
    .chapter:hover { border-color: var(--purple); transform: translateX(4px); }
    .ch-num {
      font-family: 'Orbitron', sans-serif;
      font-size: .75rem;
      color: #a78bfa;
      min-width: 3rem;
    }
    .ch-title { font-weight: 600; color: var(--text); }
    .ch-lock { margin-left: auto; font-size: 1.1rem; opacity: .5; }

    /* ── CTA ── */
    .cta-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn-primary {
      background: linear-gradient(135deg, #ffd700, #f59e0b);
      color: #0a0a14;
      font-weight: 700;
      border: none;
      padding: .75rem 2rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1rem;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,215,0,.4); }
    .btn-secondary {
      background: transparent;
      border: 2px solid #7c3aed;
      color: #a78bfa;
      font-weight: 600;
      padding: .75rem 2rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1rem;
      text-decoration: none;
      transition: background .15s, color .15s;
    }
    .btn-secondary:hover { background: #7c3aed; color: #fff; }

    /* ── Progress indicator ── */
    #progress-bar {
      width: 100%; height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #ffd700);
      border-radius: 3px;
      width: 0%;
      transition: width .5s ease;
    }

    footer {
      position: relative; z-index: 1;
      padding: 2rem;
      color: rgba(255,255,255,.3);
      font-size: .8rem;
      margin-top: auto;
    }
  </style>
</head>
<body>
<canvas id="starfield" aria-hidden="true"></canvas>

<header>
  <a href="/arcade/">&larr; Nexus Arcade</a>
  <h1>Matrix Act 1</h1>
</header>

<main>
  <div class="banner" aria-hidden="true">🔮</div>
  <h2>Conscience Protocol</h2>
  <p class="sub">Seven chapters of encrypted signals, locked nodes, and the architecture of forgiveness. Each pillar unlocks the next layer of truth.</p>

  <div id="progress-bar" role="progressbar" aria-label="Chapter completion" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div id="progress-fill"></div>
  </div>

  <div class="chapters" id="chapter-list">
    <!-- Rendered by matrix-act1.js -->
  </div>

  <div class="cta-row">
    <button class="btn-primary" id="btn-start" type="button">▶ Begin Act 1</button>
    <a class="btn-secondary" href="/arcade/">← Back to Lobby</a>
  </div>
</main>

<footer>Amazing Grace Home Living · Nexus Arcade · Matrix Act 1</footer>

<script>
/* ── Star-field ── */
(function () {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function init() {
    stars = Array.from({ length: 160 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + .2,
      a: Math.random(),
      da: (Math.random() * .004 + .001) * (Math.random() < .5 ? 1 : -1),
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a = Math.max(.05, Math.min(1, s.a + s.da));
      if (s.a <= .05 || s.a >= 1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); init(); });
  resize(); init(); draw();
})();

/* ── Chapter data ── */
const CHAPTERS = [
  { id: 1, title: 'The Heavy Gravity of the Red Queen',      icon: '⚡' },
  { id: 2, title: 'Static Between Frequencies',              icon: '📡' },
  { id: 3, title: 'The Mirror Protocol',                     icon: '🪞' },
  { id: 4, title: 'Encrypted in Starlight',                  icon: '✨' },
  { id: 5, title: 'The Unlocking Sequence',                  icon: '🔑' },
  { id: 6, title: 'Resonance Cascade',                       icon: '🌌' },
  { id: 7, title: 'Architecture of Forgiveness',             icon: '🕊️' },
];
const SAVE_KEY = 'matrix-act1-progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{"completed":[]}'); }
  catch (err) { console.warn('[matrix-act1] Could not load progress:', err); return { completed: [] }; }
}
function saveProgress(data) {
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function render() {
  const progress = loadProgress();
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const done = progress.completed.includes(ch.id);
    const el = document.createElement('div');
    el.className = 'chapter';

    const numSpan = document.createElement('span');
    numSpan.className = 'ch-num';
    numSpan.textContent = `CH ${String(ch.id).padStart(2, '0')}`;

    const titleSpan = document.createElement('span');
    titleSpan.className = 'ch-title';
    titleSpan.textContent = `${ch.icon} ${ch.title}`;

    const lockSpan = document.createElement('span');
    lockSpan.className = 'ch-lock';
    lockSpan.textContent = done ? '✅' : '🔒';

    el.appendChild(numSpan);
    el.appendChild(titleSpan);
    el.appendChild(lockSpan);
    if (done || ch.id === nextChapter(progress)) {
      el.style.cursor = 'pointer';
      el.setAttribute('tabindex', '0');
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', `Open Chapter ${ch.id}: ${ch.title}`);
      el.addEventListener('click', () => openChapter(ch.id));
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openChapter(ch.id); } });
    }
    list.appendChild(el);
  });

  const pct = Math.round((progress.completed.length / CHAPTERS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-bar').setAttribute('aria-valuenow', pct);

  const btn = document.getElementById('btn-start');
  const next = nextChapter(progress);
  btn.textContent = next === 1 ? '▶ Begin Act 1' : `▶ Continue — Ch ${next}`;
  btn.onclick = () => openChapter(next);
}

function nextChapter(progress) {
  for (let i = 1; i <= CHAPTERS.length; i++) {
    if (!progress.completed.includes(i)) return i;
  }
  return CHAPTERS.length;
}

function openChapter(id) {
  const ch = CHAPTERS.find(c => c.id === id);
  if (!ch) return;
  // Mark complete and re-render (in a real build this would open a chapter view)
  const progress = loadProgress();
  if (!progress.completed.includes(id)) {
    progress.completed.push(id);
    saveProgress(progress);
  }
  alert(`Chapter ${id}: ${ch.title}\n\n[Full chapter content coming soon]`);
  render();
}

render();
</script>
</body>
</html>
