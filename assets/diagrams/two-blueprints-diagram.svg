  <circle cx="675" cy="270" r="28" fill="#f56565" opacity="0.08" filter="url(#glow-red)"/>
  <circle cx="675" cy="270" r="16" fill="#f56565" opacity="0.15"/>
  <circle cx="675" cy="270" r="8"  fill="#f56565" opacity="0.85" filter="url(#glow-red)"/>
  <text x="712" y="265" font-family="'Courier New', monospace"
