  <line x1="683" y1="262" x2="760" y2="175" stroke="#f56565" stroke-width="2.5" stroke-linecap="round"
        filter="url(#glow-red)" opacity="0.85"/>
  <polygon points="760,175 748,182 755,191" fill="#f56565" opacity="0.85"/>
  <text x="762" y="172" font-family="'Courier New', monospace" font-size="9" fill="#f56565">VAULT UP</text>
  <text x="762" y="184" font-family="'Courier New', monospace" font-size="8" fill="#6b7a9e">+N tiers</text>

  <line x1="683" y1="278" x2="760" y2="390" stroke="#f56565" stroke-width="2.5" stroke-linecap="round"
        filter="url(#glow-red)" opacity="0.65"/>
  <polygon points="760,390 750,379 758,375" fill="#f56565" opacity="0.65"/>
  <text x="762" y="388" font-family="'Courier New', monospace" font-size="9" fill="#f56565">CRATER</text>
