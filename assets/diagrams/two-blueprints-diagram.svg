<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 900 620" width="900" height="620"
     role="img" aria-label="Two Blueprints: Ladder vs System Break — Metaphysics Diagram">

  <title>Two Blueprints — Metaphysics Diagram</title>
  <desc>Arcade Lore: The Ladder (structured ascent) vs The System Break (rupture event). Visual metaphysics diagram showing the two competing philosophies of competitive play.</desc>

  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0c11"/>
      <stop offset="100%" stop-color="#0e1120"/>
    </linearGradient>

    <!-- Ladder side glow -->
    <radialGradient id="ladder-glow" cx="25%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#4fd1c5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4fd1c5" stop-opacity="0"/>
    </radialGradient>

    <!-- Break side glow -->
    <radialGradient id="break-glow" cx="75%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#f56565" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f56565" stop-opacity="0"/>
    </radialGradient>

    <!-- Ladder column gradient -->
    <linearGradient id="ladder-col" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#1a4a47"/>
      <stop offset="100%" stop-color="#4fd1c5"/>
    </linearGradient>

    <!-- Break bolt gradient -->
    <linearGradient id="break-bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f56565"/>
      <stop offset="100%" stop-color="#fc8181"/>
    </linearGradient>

    <!-- Gold center -->
    <radialGradient id="gold-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ecc94b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ecc94b" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#252d44" stroke-width="0.5" opacity="0.5"/>
    </pattern>

    <!-- Glow filter — Ladder -->
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4fd1c5" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow filter — Break -->
    <filter id="glow-red" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f56565" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow filter — Gold -->
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ecc94b" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip for panel halves -->
    <clipPath id="left-clip">" y="197" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="9" letter-spacing="2" fill="#4fd1c5" font-weight="bold">APEX</text>

  <!-- Ascending arrow on ladder -->
  <path d="M 225 178 L 225 155 M 218 165 L 225 155 L 232 165"
        fill="none" stroke="#4fd1c5" stroke-width="2" stroke-linecap="round"
        filter="url(#glow-teal)" opacity="0.9"/>

  <!-- Annotation: decay arrow -->
  <path d="M 152 250 Q 130 310 152 380" fill="none" stroke="#6b7a9e" stroke-width="1" stroke-dasharray="4 3"/>
  <polygon points="152,380 148,368 157,370" fill="#6b7a9e" opacity="0.7"/>
  <text x="96" y="310" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="8" fill="#6b7a9e" transform="rotate(-90, 96, 310)">DECAY (INACTIVITY)</text>

  <!-- Annotation: steady climb path -->
  <path d="M 282 460 Q 310 390 302 300 Q 295 240 285 215"
        fill="none" stroke="#4fd1c5" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.45"/>
  <text x="330" y="350" font-family="'Courier New', monospace"
        font-size="9" fill="#4fd1c5" opacity="0.6">consistent</text>
  <text x="330" y="362" font-family="'Courier New', monospace"
        font-size="9" fill="#4fd1c5" opacity="0.6">climb path</text>

  <!-- Doctrine pills below ladder -->
  <rect x="90" y="490" width="110" height="22" rx="11" fill="#101420" stroke="#1a4a47" stroke-width="1"/>
  <text x="145" y="505" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="9" fill="#4fd1c5">Earned, Not Granted</text>

  <rect x="213" y="490" width="95" height="22" rx="11" fill="#101420" stroke="#1a4a47" stroke-width="1"/>
  <text x="260" y="505" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="9" fill="#4fd1c5">Rung Remembers</text>

  <rect x="125" y="520" width="120" height="22" rx="11" fill="#101420" stroke="#1a4a47" stroke-width="1"/>
  <text x="185" y="535" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="9" fill="#4fd1c5">Symmetry of Opposition</text>

  <!-- RIGHT PANEL - THE BREAK -->
  <text x="675" y="75" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="10" letter-spacing="4" fill="#f56565" opacity="0.7">BLUEPRINT II</text>
  <text x="675" y="98" text-anchor="middle" font-family="Georgia, serif"
        font-size="26" font-weight="700" fill="#f56565" filter="url(#glow-red)">The Break</text>
  <text x="675" y="118" text-anchor="middle" font-family="Georgia, serif"
        font-size="11" font-style="italic" fill="#6b7a9e">Singular Rupture · Amplified Stakes</text>

  <circle cx="635" cy="450" r="5" fill="#6b7a9e" opacity="0.35"/>
  <circle cx="645" cy="410" r="5" fill="#6b7a9e" opacity="0.35"/>
