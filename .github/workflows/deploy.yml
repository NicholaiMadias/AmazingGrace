# GitHub Pages Deploy
#
# Builds the site and pushes dist/ to the gh-pages branch on every push to main.
# rsync --exclude='pr-*/' ensures open PR previews are not wiped by production deploys.
# The CNAME file (amazinggracehl.org) is included so the custom domain stays active.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Allow only one concurrent deployment; cancel any in-progress run
# so a new push is never blocked behind a stale deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy CNAME into dist
        run: |
          test -f CNAME || { echo '::error::CNAME file not found in repository root'; exit 1; }
          cp CNAME dist/CNAME

      - name: Copy static assets into dist
        run: |
          # Copy root-level static directories that Vite does not bundle automatically.
          # Each block warns but does not fail the build if the source is missing.

          copy_dir() {
            local src="$1" dest="$2"
            if [ -d "$src" ]; then
              mkdir -p "$dest"
              # Keep already-generated files in dist when names overlap with copied static assets.
              cp -rn "$src/." "$dest/"
              echo "Copied $src -> $dest"
            else
              echo "::warning::$src not found -- skipping"
            fi
          }

          # Root assets/ (master-atlas.svg, star-atlas.svg, badges.js, etc.)
          copy_dir assets dist/assets

          # Root js/ (galleries.js and other runtime scripts)
          copy_dir js dist/js

          # Root galleries/ -- images and manifests alongside the Vite-built HTML
          copy_dir galleries dist/galleries

          # Root images/ (property photos referenced by galleries.json)
          copy_dir images dist/images

          # galleries.json: prefer public/ version (already in dist via Vite public dir);
          # fall back to a root-level copy if present and not already placed.
          if [ -f public/galleries.json ] && [ ! -f dist/galleries.json ]; then
            cp public/galleries.json dist/galleries.json
            echo "Copied public/galleries.json -> dist/galleries.json"
          elif [ -f galleries.json ] && [ ! -f dist/galleries.json ]; then
            cp galleries.json dist/galleries.json
            echo "Copied galleries.json -> dist/galleries.json"
          else
            echo "dist/galleries.json already present or no source found"
          fi

      - name: Push to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          WORK=$(mktemp -d)

          # Race-safe: retry remote fetch before falling back to orphan creation
          for attempt in 1 2 3; do
            git fetch origin gh-pages && break
            [ "$attempt" -eq 3 ] && break
            sleep 5
          done

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add --detach "$WORK" origin/gh-pages
          else
            git worktree add --orphan -b gh-pages "$WORK"
            touch "$WORK/.nojekyll"
          fi

          # Sync production build, preserving open PR preview dirs.
          # Exclude .git (worktree link file) so rsync --delete never removes it.
          rsync -a --delete --exclude='.git' --exclude='pr-*/' dist/ "$WORK/"

          cd "$WORK"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed, skipping push."
            exit 0
          fi
          git commit -m "deploy: ${GITHUB_SHA}"

          # Push with doubling backoff (10 s → 20 s → 40 s) and rebase-on-retry
          delay=10
          for i in 1 2 3; do
            git push origin HEAD:gh-pages && break
            if [ "$i" -eq 3 ]; then
              echo "::error::Push to gh-pages failed after 3 attempts"
              exit 1
            fi
            echo "Push failed (attempt $i), retrying in ${delay}s…"
            sleep "$delay"
            git fetch origin gh-pages
            git rebase origin/gh-pages
            delay=$((delay * 2))
          done
