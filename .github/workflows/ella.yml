name: Ella — Auto-Applied Suggestions

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ella-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-apply:
    runs-on: ubuntu-latest
    # Restrict to same-repo PRs to protect the write token.
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch review comments and identify suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.pulls.listReviewComments({ owner, repo, pull_number, per_page: 100 });
            core.info(`Fetched ${comments.length} review comments; scanning for suggestion blocks...`);
            const suggestion = comments.some(c => /```suggestion/.test(String(c.body || '')));
            core.info(`suggestion blocks present: ${suggestion}`);

      - name: Apply Ella patch (git commit / git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          node scripts/ella-auto-apply-review.js --apply

      - name: Post summary comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ella-auto-apply -->';
            const body = [
              marker,
              '## Ella — Auto-Applied Suggestions',
              '',
              'If a review included `<!-- ella:apply -->` and a diff/patch block, Ella attempted to apply it safely.',
            ].join('\\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

