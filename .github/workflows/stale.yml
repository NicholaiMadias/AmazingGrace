# Stale Issue & PR Bot
#
# Automatically marks issues and pull requests as stale after a period of
# inactivity, then closes them if no activity follows.
#
# Schedule: runs once per day at 02:00 UTC to keep the queue clean.
#
# Thresholds (adjust as needed):
#   Issues    — stale after 30 days, closed after 14 more days
#   PRs       — stale after 45 days, closed after 14 more days
#
# Labels required: create "stale" label in the repo (any colour) before
# this workflow can apply it.  The workflow will not fail if the label is
# missing; it simply cannot tag items.

name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:       # allow manual runs

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark & Close Stale Items
    runs-on: ubuntu-latest

    steps:
      - name: Run stale action
        uses: actions/stale@v10
        with:
          # ── Label ─────────────────────────────────────────────────────────
          stale-issue-label:      "stale"
          stale-pr-label:         "stale"
          exempt-issue-labels:    "pinned,security,blocked"
          exempt-pr-labels:       "pinned,security,blocked,do-not-merge"

          # ── Inactivity thresholds (calendar days) ─────────────────────────
          days-before-issue-stale: 30
          days-before-pr-stale:    45

          # ── Days to wait after stale label before closing ─────────────────
          days-before-issue-close: 14
          days-before-pr-close:    14

          # ── Comment text ──────────────────────────────────────────────────
          stale-issue-message: >
            This issue has been automatically marked as **stale** because it
            has not had any activity in 30 days.  It will be closed in 14 days
            if no further activity occurs.  If this issue is still relevant,
            please leave a comment or remove the `stale` label.
          close-issue-message: >
            Closing this issue due to prolonged inactivity.  Feel free to
            re-open it if the problem resurfaces or more information becomes
            available.

          stale-pr-message: >
            This pull request has been automatically marked as **stale**
            because it has not had any activity in 45 days.  It will be closed
            in 14 days if no further activity occurs.  If this PR is still
            needed, please push a new commit, leave a comment, or remove the
            `stale` label.
          close-pr-message: >
            Closing this pull request due to prolonged inactivity.  The branch
            will remain and the PR can be re-opened if the work is resumed.

          # ── Safety cap ────────────────────────────────────────────────────
          # Process at most 50 items per run to stay within rate limits.
          operations-per-run: 50
