# Domain Monitor
#
# Scheduled uptime check for amazinggracehl.org.
# Runs every 15 minutes and on every push to main so regressions are caught
# immediately after a deploy.
#
# On failure the job:
#   1. Writes a structured alert payload to the step summary.
#   2. Opens (or updates) a GitHub Issue titled "🚨 Site Down: amazinggracehl.org"
#      so the team is notified through normal GitHub notification channels.
#
# When the site recovers the workflow closes any open "Site Down" issue
# automatically.

name: Domain Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Uptime check — amazinggracehl.org
    runs-on: ubuntu-latest

    steps:
      - name: Check HTTPS status
        id: probe
        run: |
          DOMAIN="amazinggracehl.org"
          URL="https://${DOMAIN}"

          HTTP_CODE=$(curl --silent --max-time 15 --retry 2 --retry-delay 5 \
            --write-out "%{http_code}" --output /dev/null "$URL" || echo "000")

          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          echo "domain=${DOMAIN}"       >> "$GITHUB_OUTPUT"
          echo "url=${URL}"             >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "status=up"   >> "$GITHUB_OUTPUT"
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
          fi

      - name: Log result to step summary
        run: |
          STATUS="${{ steps.probe.outputs.status }}"
          CODE="${{ steps.probe.outputs.http_code }}"
          DOMAIN="${{ steps.probe.outputs.domain }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [ "$STATUS" = "up" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${ICON} Domain Monitor — ${DOMAIN}

          | Field      | Value            |
          |------------|------------------|
          | Status     | ${STATUS}        |
          | HTTP code  | ${CODE}          |
          | Checked at | ${TIMESTAMP}     |
          EOF

          if [ "$STATUS" = "down" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<EOF

          ### Alert Payload
          \`\`\`json
          {
            "domain": "${DOMAIN}",
            "severity": "critical",
            "category": "outreach",
            "status": "down",
            "http_code": "${CODE}",
            "checked_at": "${TIMESTAMP}"
          }
          \`\`\`
          EOF
          fi

      # ── Site DOWN: write alert payload and open/update a GitHub Issue ────────
      - name: Alert — open or update "Site Down" issue
        if: steps.probe.outputs.status == 'down'
        uses: actions/github-script@v7
        env:
          HTTP_CODE: ${{ steps.probe.outputs.http_code }}
          DOMAIN: ${{ steps.probe.outputs.domain }}
          URL: ${{ steps.probe.outputs.url }}
        with:
          script: |
            const domain   = process.env.DOMAIN;
            const code     = process.env.HTTP_CODE;
            const url      = process.env.URL;
            const now      = new Date().toISOString();

            // Structured alert payload (governance spec §2)
            const payload = JSON.stringify({
              domain,
              severity: 'critical',
              category: 'outreach',
              status: 'down',
              http_code: code,
              checked_at: now,
              run_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            }, null, 2);

            const title  = `🚨 Site Down: ${domain}`;
            const marker = '<!-- domain-monitor-alert -->';
            const body   = [
              marker,
              `## 🚨 Outage Alert — \`${domain}\``,
              '',
              '```json',
              payload,
              '```',
              '',
              `Last checked: ${now}`,
              '',
              `> This issue is managed automatically by the **Domain Monitor** workflow.`,
              `> It will be closed automatically when the site recovers.`,
            ].join('\n');

            // Search for an existing open alert issue.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'domain-monitor',
              per_page: 20,
            });
            const existing = issues.find(i => i.title === title);

            if (existing) {
              // Update the timestamp in the existing issue.
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              // Create a new alert issue.
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['domain-monitor'],
              });
              core.info('Created new domain-monitor issue');
            }

      # ── Site UP: close any open "Site Down" issue ─────────────────────────────
      - name: Recovery — close "Site Down" issue if open
        if: steps.probe.outputs.status == 'up'
        uses: actions/github-script@v7
        env:
          DOMAIN: ${{ steps.probe.outputs.domain }}
        with:
          script: |
            const domain = process.env.DOMAIN;
            const title  = `🚨 Site Down: ${domain}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'domain-monitor',
              per_page: 20,
            });
            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `✅ **Recovery confirmed** — \`${domain}\` is back up as of ${new Date().toISOString()}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.info(`Closed recovery issue #${existing.number}`);
            }

      # Fail the workflow step so the run is marked red in Actions UI when down.
      - name: Fail if site is down
        if: steps.probe.outputs.status == 'down'
        run: |
          echo "::error::amazinggracehl.org returned HTTP ${{ steps.probe.outputs.http_code }} — site appears DOWN."
          exit 1
