<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  Amazing Grace Story Library — Reusable Story Page Template  ║
  ╠══════════════════════════════════════════════════════════════╣
  ║                                                              ║
  ║  HOW TO USE                                                  ║
  ║  ──────────                                                  ║
  ║  1. Copy this file to  stories/<slug>/index.html             ║
  ║  2. Replace every {{placeholder}} with the real content.     ║
  ║  3. Add an entry to stories/library.json so the index        ║
  ║     picks it up automatically:                               ║
  ║                                                              ║
  ║     {                                                        ║
  ║       "title":  "{{title}}",                                 ║
  ║       "author": "{{author}}",                                ║
  ║       "genre":  "{{genre}}",                                 ║
  ║       "series": "{{series}}",                                ║
  ║       "slug":   "{{slug}}",                                  ║
  ║       "path":   "/stories/{{slug}}/",                        ║
  ║       "tags":   ["tag1", "tag2"],                            ║
  ║       "summary":"{{description}}"                            ║
  ║     }                                                        ║
  ║                                                              ║
  ║  PLACEHOLDERS                                                ║
  ║  ────────────                                                ║
  ║  {{slug}}        — URL-safe identifier, e.g. noah-and-the-ark║
  ║  {{title}}       — Story title                               ║
  ║  {{author}}      — Author name                               ║
  ║  {{series}}      — Series name (or leave blank / remove)     ║
  ║  {{genre}}       — Genre label, e.g. "Faith / Origins"       ║
  ║  {{description}} — One-sentence summary for <meta>           ║
  ║  {{body}}        — Main story HTML content (chapters, etc.)  ║
  ║  {{tags}}        — Comma-separated tags for the meta tag     ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HKZ2G2VN78"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-HKZ2G2VN78');
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{description}}">
    <meta name="keywords" content="{{tags}}">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <title>{{title}} | Amazing Grace Story Library</title>

    <!-- Open Graph -->
    <meta property="og:type"        content="article">
    <meta property="og:title"       content="{{title}} | Amazing Grace Story Library">
    <meta property="og:description" content="{{description}}">
    <meta property="og:url"         content="https://amazinggracehl.org/stories/{{slug}}/">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            line-height: 1.75;
            padding: 2rem 1.5rem;
            max-width: 720px;
            margin: 0 auto;
        }

        a { color: #4af; text-decoration: underline; }
        a:hover, a:focus { color: #7cf; }
        a:focus-visible { outline: 2px solid #4af; outline-offset: 2px; }

        /* ── Top nav ── */
        .topnav {
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem 1rem;
        }

        /* ── Story header ── */
        .story-header { margin-bottom: 2rem; }
        .story-header h1 {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .story-meta {
            font-size: 0.8rem;
            color: #666;
        }
        .story-meta span + span::before {
            content: ' — ';
        }

        hr {
            border: none;
            border-top: 1px solid #333;
            margin: 1.5rem 0;
        }

        /* ── Body content ── */
        .story-body { margin-bottom: 2.5rem; }
        .story-body h2 {
            font-size: 1.1rem;
            color: #eee;
            margin: 2rem 0 0.75rem;
        }
        .story-body p { margin-bottom: 1rem; }
        .story-body blockquote {
            border-left: 3px solid #4af;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            color: #aaa;
            font-style: italic;
        }

        /* ── Back link ── */
        .back-link { font-size: 0.85rem; }

        /* ── Footer ── */
        footer {
            margin-top: 3rem;
            border-top: 1px solid #333;
            padding-top: 1rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

<nav class="topnav" aria-label="Site navigation">
    <a href="/">Home</a>
    <a href="/stories/">Library</a>
    <a href="/ministry/">Ministry</a>
    <a href="/arcade/">Arcade</a>
</nav>

<article>
    <header class="story-header">
        <h1>{{title}}</h1>
        <p class="story-meta">
            <span>{{author}}</span>
            <span>{{series}}</span>
            <span>{{genre}}</span>
        </p>
    </header>

    <hr>

    <div class="story-body">
        {{body}}
    </div>
</article>

<p class="back-link"><a href="/stories/">← Back to Storybook Library</a></p>

<footer>
    <p>&copy; 2026 Amazing Grace Home Living &mdash; <a href="/">amazinggracehl.org</a></p>
</footer>

</body>
</html>
