<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amazing Grace Home Living — Secure, all-inclusive housing in Tampa and Largo, Voice of Jesus Ministry, and The Seven Stars Educational Arcade.">
    <meta name="theme-color" content="#0f172a">

    <link rel="icon" type="image/png" href="./Assets/logo.png">
    <link rel="manifest" href="./manifest.json">
    <title>Amazing Grace Home Living</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --night:         #000000;
            --night-surface: #000000;
            --night-card:    #000000;
            --gold:          #ffd700;
            --gold-dim:      rgba(255,215,0,0.18);
            --accent:        #00ff66;
            --accent-dim:    rgba(0,255,102,0.1);
            --accent-link:   #00aaff;
            --accent-link-h: #33ccff;
            --border:        #003344;
            --text:          #00ff66;
            --text-muted:    rgba(0,255,102,0.65);
            --radius:        12px;

            /* nav gem colours */
            --col-gold:      #ffd700;
            --col-sapphire:  #00aaff;
            --col-silver:    #b0bec5;
            --col-ruby:      #e57373;
            --col-amethyst:  #00ff66;
            --col-emerald:   #33ccff;
        }

        @media (prefers-reduced-motion: no-preference) {
            html { scroll-behavior: smooth; }
        }

        body {
            font-family: 'Orbitron', 'Exo 2', 'Inter', sans-serif;
            background: #000000;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: -1;
            pointer-events: none;
        }

        *:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

        /* ── Header ── */
        .site-header {
            background: #000000;
            backdrop-filter: none;
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 300;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
            margin-right: auto;
        }

        .brand-logo {
            height: 38px;
            width: auto;
            border-radius: 6px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent);
            line-height: 1.1;
        }

        .brand-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* ── Nav ── */
        #main-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            align-items: center;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.85rem;
            border-radius: 7px;
            border: 1px solid transparent;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--accent-link);
            background: transparent;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
