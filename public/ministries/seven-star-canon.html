<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seven‑Star Canon — Amazing Grace</title>

  <style>
    body {
      background: #0d0f12;
      color: #e6e6e6;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    header h1 {
      font-size: 2.8rem;
      color: #ffd700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: #14171c;
      border: 1px solid #1f2329;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 18px rgba(255, 215, 0, 0.15);
    }

    .card h3 {
      color: #ffd700;
      margin-bottom: 0.5rem;
    }

    .virtue {
      opacity: 0.85;
      margin-bottom: 1rem;
    }

    svg {
      width: 60px;
      height: 60px;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Seven‑Star Canon</h1>
    <p>The virtues, gems, and celestial order of the Amazing Grace universe.</p>
  </header>

  <section class="grid">

    <div class="card">
      <!-- Alcyone -->
      <?xml version="1.0"?> 
      <!-- paste gem-alcyone.svg here -->
      <h3>Alcyone</h3>
      <div class="virtue">Virtue: Serenity</div>
    </div>

    <div class="card">
      <!-- Celaeno -->
      <!-- paste gem-celaeno.svg here -->
      <h3>Celaeno</h3>
      <div class="virtue">Virtue: Sustenance</div>
    </div>

    <div class="card">
      <!-- Electra -->
      <!-- paste gem-electra.svg here -->
      <h3>Electra</h3>
      <div class="virtue">Virtue: Vision</div>
    </div>

    <div class="card">
      <!-- Maia -->
      <!-- paste gem-maia.svg here -->
      <h3>Maia</h3>
      <div class="virtue">Virtue: Autonomy</div>
    </div>

    <div class="card">
      <!-- Merope -->
      <!-- paste gem-merope.svg here -->
      <h3>Merope</h3>
      <div class="virtue">Virtue: Humility</div>
    </div>

    <div class="card">
      <!-- Sterope -->
      <!-- paste gem-sterope.svg here -->
      <h3>Sterope</h3>
      <div class="virtue">Virtue: Patience</div>
    </div>

    <div class="card">
      <!-- Taygete -->
      <!-- paste gem-taygete.svg here -->
      <h3>Taygete</h3>
      <div class="virtue">Virtue: Courage</div>
    </div>

  </section>
</body>
</html>
