<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89C4E1"/>
      <stop offset="100%" stop-color="#D6EEFF"/>
    </linearGradient>
    <linearGradient id="grass1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#68B265"/>
      <stop offset="100%" stop-color="#4D8F4A"/>
    </linearGradient>
    <linearGradient id="stucco" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2D5A0"/>
      <stop offset="100%" stop-color="#CFC28A"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky1)"/>

  <!-- Clouds -->
  <ellipse cx="100" cy="70" rx="65" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="145" cy="56" rx="48" ry="20" fill="white" opacity="0.85"/>
  <ellipse cx="62" cy="62" rx="38" ry="16" fill="white" opacity="0.80"/>
  <ellipse cx="580" cy="78" rx="70" ry="22" fill="white" opacity="0.75"/>
  <ellipse cx="630" cy="63" rx="50" ry="19" fill="white" opacity="0.75"/>
  <ellipse cx="720" cy="88" rx="45" ry="16" fill="white" opacity="0.70"/>

  <!-- Grass ground -->
  <rect x="0" y="335" width="800" height="115" fill="url(#grass1)"/>

  <!-- Sidewalk/path -->
  <polygon points="355,450 380,335 425,335 455,450" fill="#C8BEA8"/>
  <line x1="417" y1="335" x2="417" y2="450" stroke="rgba(0,0,0,0.07)" stroke-width="1.5"/>

  <!-- Driveway left -->
  <polygon points="0,450 0,360 155,335 190,450" fill="#B8AE98"/>
  <line x1="95" y1="335" x2="95" y2="450" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>

  <!-- Large tree (left) -->
  <rect x="80" y="190" width="14" height="155" fill="#7A5A30" rx="4"/>
  <!-- Tree canopy -->
  <ellipse cx="87" cy="178" rx="52" ry="42" fill="#3A8A38" opacity="0.95"/>
  <ellipse cx="62" cy="195" rx="38" ry="30" fill="#348030" opacity="0.90"/>
  <ellipse cx="115" cy="190" rx="35" ry="28" fill="#44943A" opacity="0.88"/>
  <ellipse cx="87" cy="162" rx="42" ry="32" fill="#3E9036" opacity="0.92"/>

  <!-- Shrubs along foundation -->
  <ellipse cx="200" cy="333" rx="45" ry="20" fill="#3A8A38"/>
  <ellipse cx="175" cy="329" rx="30" ry="16" fill="#44943A"/>
  <ellipse cx="580" cy="333" rx="40" ry="19" fill="#3A8A38"/>
  <ellipse cx="555" cy="329" rx="28" ry="15" fill="#44943A"/>
  <ellipse cx="612" cy="330" rx="25" ry="15" fill="#3E9036"/>

  <!-- House body -->
  <rect x="145" y="220" width="500" height="160" fill="url(#stucco)" rx="3"/>

  <!-- Upper story (attic dormer style) -->
  <rect x="240" y="155" width="310" height="80" fill="#D8CA92" rx="3"/>

  <!-- Roof — main dark grey -->
  <polygon points="120,222 400,98 680,222" fill="#3C3C3C"/>
  <!-- Roof texture lines -->
  <line x1="155" y1="178" x2="648" y2="178" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  <line x1="170" y1="199" x2="633" y2="199" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Dormer roof -->
  <polygon points="230,155 400,82 570,155" fill="#3C3C3C"/>
  <!-- Roof fascia/trim -->
  <line x1="120" y1="222" x2="680" y2="222" stroke="#555" stroke-width="3"/>
  <!-- Gutters -->
  <rect x="120" y="219" width="560" height="7" fill="#888" rx="2" opacity="0.6"/>

  <!-- Chimney -->
  <rect x="490" y="110" width="30" height="90" fill="#6A6A6A"/>
  <rect x="484" y="105" width="42" height="10" fill="#555"/>
  <!-- Chimney cap -->
  <rect x="482" y="104" width="46" height="4" fill="#444"/>

  <!-- Front door (center) -->
  <rect x="358" y="300" width="78" height="80" fill="#5A3520" rx="3"/>
  <!-- Door panels -->
  <rect x="365" y="307" width="28" height="28" fill="rgba(255,255,255,0.08)" rx="2"/>
  <rect x="399" y="307" width="28" height="28" fill="rgba(255,255,255,0.08)" rx="2"/>
  <rect x="365" y="340" width="28" height="32" fill="rgba(255,255,255,0.08)" rx="2"/>
  <rect x="399" y="340" width="28" height="32" fill="rgba(255,255,255,0.08)" rx="2"/>
  <!-- Knob -->
  <circle cx="391" cy="340" r="5" fill="#C09020"/>
  <!-- Transom window -->
  <rect x="358" y="292" width="78" height="12" fill="#BFD9EE" rx="2"/>

  <!-- Left window pair -->
  <rect x="178" y="250" width="75" height="60" fill="#BFD9EE" rx="3" stroke="#C0A860" stroke-width="2"/>
  <line x1="215" y1="250" x2="215" y2="310" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="178" y1="280" x2="253" y2="280" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <!-- Window trim -->
  <rect x="174" y="246" width="83" height="68" fill="none" stroke="#F5F0E0" stroke-width="3" rx="3"/>

  <!-- Centre-left window -->
  <rect x="273" y="250" width="70" height="60" fill="#BFD9EE" rx="3" stroke="#C0A860" stroke-width="2"/>
  <line x1="308" y1="250" x2="308" y2="310" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="273" y1="280" x2="343" y2="280" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <rect x="269" y="246" width="78" height="68" fill="none" stroke="#F5F0E0" stroke-width="3" rx="3"/>

  <!-- Centre-right window -->
  <rect x="452" y="250" width="70" height="60" fill="#BFD9EE" rx="3" stroke="#C0A860" stroke-width="2"/>
  <line x1="487" y1="250" x2="487" y2="310" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="452" y1="280" x2="522" y2="280" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <rect x="448" y="246" width="78" height="68" fill="none" stroke="#F5F0E0" stroke-width="3" rx="3"/>

  <!-- Right window -->
  <rect x="545" y="250" width="75" height="60" fill="#BFD9EE" rx="3" stroke="#C0A860" stroke-width="2"/>
  <line x1="582" y1="250" x2="582" y2="310" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="545" y1="280" x2="620" y2="280" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <rect x="541" y="246" width="83" height="68" fill="none" stroke="#F5F0E0" stroke-width="3" rx="3"/>

  <!-- Dormer window (upper centre) -->
  <rect x="356" y="165" width="90" height="62" fill="#BFD9EE" rx="3" stroke="#F5F0E0" stroke-width="3"/>
  <line x1="401" y1="165" x2="401" y2="227" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="356" y1="196" x2="446" y2="196" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>

  <!-- Porch overhang -->
  <rect x="295" y="318" width="210" height="10" fill="#C8A860" opacity="0.55" rx="2"/>
  <!-- Porch columns -->
  <rect x="305" y="298" width="8" height="52" fill="#E8D8A0" opacity="0.75"/>
  <rect x="487" y="298" width="8" height="52" fill="#E8D8A0" opacity="0.75"/>

  <!-- Porch step -->
  <rect x="330" y="378" width="140" height="10" fill="#C8B888" rx="2"/>
  <rect x="320" y="386" width="160" height="10" fill="#B8A878" rx="2"/>

  <!-- Label bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(26,82,118,0.92)"/>
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.04em">1144 7th St NW — Largo, FL</text>
  <text x="400" y="443" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="0.07em">ALL-INCLUSIVE · UTILITIES PAID · WI-FI INCLUDED</text>
</svg>
