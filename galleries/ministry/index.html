    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap');
        :root {
            --deep-purple: #4a235a;
            --gold:        #ffd700;
            --gold-dim:    rgba(255,215,0,0.75);
            --bg:          #0d0115;
            --surface:     rgba(74,35,90,0.55);
            --border:      rgba(255,215,0,0.22);
            --text:        #f0e6ff;
            --text-muted:  #b89dc8;
            --accent:      #c084fc;
            --radius:      12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @media (prefers-reduced-motion: no-preference) { html { scroll-behavior: smooth; } }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; min-height:100vh; }
        body::before {
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(107,55,128,0.3) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(74,35,90,0.4) 0%, transparent 55%),
                var(--bg);
            z-index:-1;
            pointer-events:none;
        }
        *:focus-visible { outline:3px solid var(--gold); outline-offset:2px; }
        .site-header {
            background:rgba(20,5,32,0.95);
            backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
            padding:0.85rem 2rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:sticky;
            top:0;
            z-index:200;
        }
        .logo { display:flex; align-items:center; gap:0.65rem; font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; text-decoration:none; color:var(--gold); }
        .logo img { height:34px; width:auto; border-radius:4px; }
        .nav-links { display:flex; gap:0.5rem; }
        .nav-btn { background:rgba(255,215,0,0.07); border:1px solid var(--border); padding:0.45rem 1rem; border-radius:6px; text-decoration:none; color:var(--text); font-weight:600; font-size:0.85rem; transition:background 0.2s,color 0.2s,border-color 0.2s; }
        .nav-btn:hover { background:rgba(255,215,0,0.18); border-color:var(--gold); color:var(--gold); }
        .nav-btn.active { background:rgba(192,132,252,0.2); border-color:var(--accent); color:var(--accent); }
        .menu-toggle { display:none; background:none; border:none; font-size:1.75rem; color:var(--gold); cursor:pointer; padding:0.25rem; }
        @media(max-width:640px){
            .nav-links { display:none; flex-direction:column; position:absolute; top:100%; left:0; right:0; background:rgba(13,1,21,0.98); padding:1rem; z-index:200; border-bottom:1px solid var(--border); gap:0.5rem; }
            .nav-links.show { display:flex; }
            .menu-toggle { display:block; }
            .nav-btn { width:100%; padding:0.75rem 1rem; }
        }
        .hero {
            text-align:center;
            padding:4rem 1.5rem 2.5rem;
            position:relative;
        }
        .hero::before {
            content:'';
            position:absolute;
            inset:0;
            background:radial-gradient(ellipse at 50% 70%, rgba(192,132,252,0.1) 0%, transparent 60%);
            pointer-events:none;
        }
        .hero h1 {
            font-family:'Orbitron',sans-serif;
            font-size:clamp(1.4rem,4vw,2.25rem);
            font-weight:900;
            color:var(--gold);
            text-shadow:0 0 28px rgba(255,215,0,0.3);
            margin-bottom:0.6rem;
            letter-spacing:0.04em;
        }
        .hero p { color:var(--text-muted); font-size:0.95rem; }
        .container { max-width:1000px; margin:2rem auto; padding:0 1.5rem; flex:1; }
        .breadcrumb { font-size:0.825rem; color:var(--text-muted); margin-bottom:1.5rem; }
        .breadcrumb a { color:var(--gold-dim); text-decoration:none; }
        .breadcrumb a:hover { color:var(--gold); text-decoration:underline; }
        .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
        .gallery-item {
            border-radius:var(--radius);
            overflow:hidden;
            background:var(--surface);
            border:1px solid var(--border);
            aspect-ratio:4/3;
            box-shadow:0 2px 12px rgba(0,0,0,0.4);
            transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
        }
        .gallery-item:hover { transform:translateY(-4px); box-shadow:0 8px 28px rgba(255,215,0,0.15); border-color:var(--gold); }
        .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
        .gallery-item img:hover { transform:scale(1.04); }
        .gallery-empty { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:3rem; text-align:center; }
        .gallery-empty-icon { font-size:3rem; margin-bottom:1rem; }
        .gallery-empty p { color:var(--text-muted); font-size:1rem; }
        #gallery-status { color:var(--text-muted); font-size:0.875rem; margin-bottom:1rem; }
        main { flex:1; display:flex; flex-direction:column; }
        .site-footer {
            background:rgba(10,2,18,0.9);
            border-top:1px solid var(--border);
            color:var(--text-muted);
            text-align:center;
            padding:1.5rem;
            font-size:0.875rem;
            margin-top:auto;
        }
        .site-footer a { color:var(--gold-dim); text-decoration:none; }
        .site-footer a:hover { color:var(--gold); text-decoration:underline; }

<body>
    <header class="site-header">

            <img src="../../assets/logo-S7NXL_ug.png" alt="Amazing Grace Home Living Logo">

    <script>
        (function () {
            var toggle = document.querySelector('.menu-toggle');
            var nav = document.getElementById('main-nav');
            if (toggle && nav) {
                toggle.addEventListener('click', function () {
                    var isExpanded = nav.classList.toggle('show');
                    toggle.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
                });
            }
        })();
    </script>
    <div id="constellation-nav"></div>
