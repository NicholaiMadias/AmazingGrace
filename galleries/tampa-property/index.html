    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tampa property photos — Amazing Grace Home Living.">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="icon" type="image/png" href="../../assets/logo.png">
    <title>Gallery — Tampa Property | Amazing Grace Home Living</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap');
        :root {
            --deep-purple:#4a235a; --deep-purple-dark:#2e1038; --gold:#ffd700;
            --text:#f0e6ff; --text-muted:#b89dc8; --surface:rgba(74,35,90,0.55);
            --border:rgba(255,215,0,0.25); --radius:12px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Inter',sans-serif;background:#0d0115;color:var(--text);display:flex;flex-direction:column;min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(107,55,128,0.3) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(74,35,90,0.4) 0%,transparent 55%),#0d0115;z-index:-1;pointer-events:none;}
        *:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
        .site-header{background:rgba(30,10,45,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.85rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;}
        .logo{display:flex;align-items:center;gap:0.65rem;font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;text-decoration:none;color:var(--gold);}
        .logo img{height:34px;width:auto;border-radius:4px;}
        .nav-links{display:flex;gap:0.5rem;}
        .nav-btn{background:rgba(255,215,0,0.07);border:1px solid var(--border);padding:0.45rem 1rem;border-radius:6px;text-decoration:none;color:var(--text);font-weight:600;font-size:0.85rem;transition:background 0.2s,color 0.2s,border-color 0.2s;}
        .nav-btn:hover{background:rgba(255,215,0,0.18);border-color:var(--gold);color:var(--gold);}
        .menu-toggle{display:none;background:none;border:none;font-size:1.75rem;color:var(--gold);cursor:pointer;padding:0.25rem;}
        @media(max-width:640px){
            .nav-links{display:none;flex-direction:column;position:absolute;top:100%;left:0;right:0;background:rgba(20,5,35,0.98);padding:1rem;z-index:200;border-bottom:1px solid var(--border);gap:0.5rem;}
            .nav-links.show{display:flex;}
            .menu-toggle{display:block;}
            .nav-btn{width:100%;padding:0.75rem 1rem;}
        }
        .hero{background:linear-gradient(175deg,rgba(74,35,90,0.9) 0%,rgba(20,5,40,0.95) 100%);border-bottom:1px solid var(--border);text-align:center;padding:3rem 1.5rem 2rem;}
        .hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,3.5vw,2rem);font-weight:900;color:#fff;margin-bottom:0.5rem;text-shadow:0 0 20px rgba(255,215,0,0.2);}
        .hero h1 span{color:var(--gold);}
        .hero p{color:var(--text-muted);font-size:0.95rem;}
        .container{max-width:1000px;margin:2rem auto;padding:0 1.5rem;flex:1;}
        .breadcrumb{font-size:0.825rem;color:var(--text-muted);margin-bottom:1.5rem;}
        .breadcrumb a{color:var(--gold);text-decoration:none;}
        .breadcrumb a:hover{text-decoration:underline;}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}
        .gallery-item{border-radius:var(--radius);overflow:hidden;background:rgba(30,10,45,0.85);border:1px solid var(--border);aspect-ratio:4/3;transition:border-color 0.2s,transform 0.2s;}
        .gallery-item:hover{border-color:var(--gold);transform:translateY(-2px);}
        .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.2s;}
        .gallery-item img:hover{transform:scale(1.03);}
        .gallery-empty{background:rgba(30,10,45,0.85);border:1px solid var(--border);border-radius:16px;padding:3rem;text-align:center;}
        .gallery-empty-icon{font-size:3rem;margin-bottom:1rem;}
        .gallery-empty p{color:var(--text-muted);font-size:1rem;}
        #gallery-status{color:var(--text-muted);font-size:0.875rem;margin-bottom:1rem;}
        main{flex:1;display:flex;flex-direction:column;}
        .site-footer{background:rgba(10,0,20,0.9);border-top:1px solid var(--border);color:var(--text-muted);text-align:center;padding:1.5rem;font-size:0.875rem;margin-top:auto;}
        .site-footer a{color:var(--gold);text-decoration:none;}
        .site-footer a:hover{text-decoration:underline;}
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="logo" aria-label="Amazing Grace Home Living — Home">
            <img src="../../assets/logo.png" alt="Amazing Grace Home Living Logo">
            <span>Amazing Grace</span>
        </a>
        <nav id="main-nav" class="nav-links" aria-label="Main navigation">
            <a href="/" class="nav-btn">🏠 Home</a>
            <a href="/stories/" class="nav-btn">📚 Library</a>
            <a href="/arcade" class="nav-btn">🎮 Arcade</a>
            <a href="/ministry" class="nav-btn">🕊️ Ministry</a>
        </nav>
        <button class="menu-toggle" aria-label="Toggle navigation" aria-controls="main-nav" aria-expanded="false">☰</button>
    </header>
    <main>
        <div class="hero">
            <h1>🌆 <span>Tampa Property</span> Gallery</h1>
            <p>Tampa, FL &mdash; All-Inclusive Rooms</p>
        </div>
        <div class="container">
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a> › <a href="/#properties">Listings</a> › Tampa Property
            </nav>
            <p id="gallery-status" role="status" aria-live="polite"></p>
            <div id="gallery-grid" class="gallery-grid" data-gallery="tampa-property" aria-label="Property photos"></div>
            <div id="gallery-empty" class="gallery-empty" style="display:none">
                <div class="gallery-empty-icon">🖼️</div>
                <p>No images uploaded yet.</p>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 Amazing Grace Home Living &mdash; <a href="/">amazinggracehl.org</a></p>
    </footer>
    <script src="/js/galleries.js"></script>
    <script>
        (function () {
            var toggle = document.querySelector('.menu-toggle');
            var nav = document.getElementById('main-nav');
            if (toggle && nav) {
                toggle.addEventListener('click', function () {
                    var isExpanded = nav.classList.toggle('show');
                    toggle.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
                });
            }
        })();
    </script>
    <div id="constellation-nav"></div>
    <script type="module" src="../../constellation-nav.js"></script>
</body>
</html>
